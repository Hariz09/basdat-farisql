services:
  db:
    image: postgres:latest
    ports:
      - '15001:5432'
    restart: 'no'
    environment:
      - POSTGRES_USER=fadhil.daffa
      - POSTGRES_PASSWORD=postgres
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - db:/var/lib/postgresql/data

volumes:
  db:
    driver: local